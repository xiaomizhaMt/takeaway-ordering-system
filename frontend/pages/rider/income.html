<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收益钱包 - 外卖订餐管理系统</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .wallet-hero { display:grid; grid-template-columns: 1.2fr 1fr; gap:20px; margin-bottom:20px; }
    .wallet-card { background:linear-gradient(135deg,#ff7a45,#ffb088); color:white; border-radius:16px; padding:24px; box-shadow:0 8px 24px rgba(255,107,53,.22); }
    .wallet-card .amount { font-size:2.2rem; font-weight:800; margin:8px 0; }
    .wallet-card .sub { opacity:.9; font-size:.9rem; }
    .metric-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px; }
    .metric-mini { background:white; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.06); padding:18px; }
    .metric-mini .label { color:var(--gray); font-size:.86rem; }
    .metric-mini .value { margin-top:8px; font-size:1.35rem; font-weight:700; color:#333; }
    .toolbar-card { margin-bottom:20px; }
    .toolbar-card .card-body { padding:16px; }
    .tool-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .tool-row .form-control { width:auto; min-width:150px; }
    .content-grid { display:grid; grid-template-columns: 0.9fr 1.1fr; gap:20px; margin-bottom:20px; align-items:stretch; }
    .content-grid > .card { height:270px; display:flex; flex-direction:column; }
    .content-grid > .card .card-header { flex:0 0 auto; }
    .income-summary-body { flex:1; min-height:0; padding:18px !important; display:flex; align-items:center; justify-content:center; }
    #transactionList { flex:1; min-height:0; padding:14px 16px 16px; overflow:hidden; }
    .tx-scroll { height:132px; overflow-x:auto; overflow-y:scroll; padding:0 0 8px; scrollbar-gutter:stable both-edges; }
    .tx-table { min-width:920px; width:max-content; border-collapse:collapse; }
    .tx-table th, .tx-table td { white-space:nowrap; vertical-align:middle; padding:10px 14px; }
    .tx-table th { position:sticky; top:0; z-index:1; background:var(--light-gray); }
    .tx-table .tx-remark { min-width:190px; max-width:260px; overflow:hidden; text-overflow:ellipsis; }
    .tx-table .tx-time { min-width:130px; }
    .tx-table .tx-order { min-width:86px; }
    .chart-card-body { padding:20px 24px 28px; }
    .chart-wrap { width:100%; overflow-x:auto; padding:8px 0; }
    .chart-svg { min-width:820px; width:100%; height:360px; display:block; }
    .chart-subtitle { color:var(--gray); font-size:.88rem; margin-bottom:8px; }
    .chart-grid { stroke:#e5e7eb; stroke-width:1; }
    .chart-axis { stroke:#cbd5e1; stroke-width:1.4; }
    .chart-label { fill:#64748b; font-size:12px; }
    .chart-line { fill:none; stroke:var(--primary); stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
    .chart-area { fill:rgba(255,107,53,.12); }
    .chart-point { fill:#fff; stroke:var(--primary); stroke-width:3; cursor:pointer; }
    .chart-point:hover { fill:var(--primary); }
    .chart-value { fill:#334155; font-size:12px; font-weight:600; }
    @media (max-width: 900px) {
      .wallet-hero, .content-grid { grid-template-columns:1fr; }
      .content-grid > .card { height:auto; min-height:240px; }
      .metric-grid { grid-template-columns:1fr 1fr; }
      .tool-row .form-control { width:100%; }
    }
    @media (max-width: 520px) { .metric-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">🛵 配送员端</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">首页</a></li>
      <li><a href="tasks.html">配送任务</a></li>
      <li><a href="income.html" class="active">收益钱包</a></li>
    </ul>
    <div class="navbar-right">
      <span class="user-info" id="userInfo"></span>
      <a href="javascript:void(0)" class="btn btn-outline btn-sm" onclick="doLogout()">退出</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <div>
        <h2>💰 收益钱包</h2>
        <div class="text-muted" style="font-size:.9rem;margin-top:4px">集中展示配送收益、钱包余额、提现和资金流水。</div>
      </div>
      <button class="btn btn-outline" onclick="refreshAll()">刷新全部</button>
    </div>

    <div class="wallet-hero">
      <div class="wallet-card">
        <div class="sub">当前可提现余额</div>
        <div class="amount">¥<span id="walletBalance">0.00</span></div>
        <div class="sub">余额来自已完成配送收入，提现成功后会生成钱包流水。</div>
      </div>
      <div class="card">
        <div class="card-header">提现</div>
        <div class="card-body">
          <div class="tool-row">
            <input type="number" class="form-control" id="withdrawAmount" min="0.01" step="0.01" placeholder="提现金额">
            <select class="form-control" id="withdrawChannel">
              <option value="bank_card">银行卡</option>
              <option value="alipay">支付宝</option>
            </select>
            <button class="btn btn-primary" onclick="withdraw()">确认提现</button>
          </div>
          <small class="text-muted">提现会从可提现余额扣减，并在资金流水中记录。</small>
        </div>
      </div>
    </div>

    <div class="metric-grid">
      <div class="metric-mini"><div class="label">累计入账收益</div><div class="value">¥<span id="totalWalletIncome">0.00</span></div></div>
      <div class="metric-mini"><div class="label">累计提现</div><div class="value">¥<span id="totalWithdraw">0.00</span></div></div>
      <div class="metric-mini"><div class="label">筛选内配送单数</div><div class="value"><span id="totalDeliveries">0</span> 单</div></div>
      <div class="metric-mini"><div class="label">筛选内平均每单</div><div class="value">¥<span id="avgIncome">0.00</span></div></div>
    </div>

    <div class="card toolbar-card">
      <div class="card-header">收益查询</div>
      <div class="card-body">
        <div class="tool-row">
          <input type="text" class="form-control" id="incomeKeyword" placeholder="订单号 / 商家" onkeydown="if(event.key==='Enter') loadIncome()">
          <input type="date" class="form-control" id="startDate" onchange="loadIncome()">
          <input type="date" class="form-control" id="endDate" onchange="loadIncome()">
          <button class="btn btn-primary" onclick="loadIncome()">查询收益</button>
          <button class="btn btn-outline" onclick="resetIncomeQuery()">重置</button>
        </div>
      </div>
    </div>

    <div class="content-grid">
      <div class="card">
        <div class="card-header">筛选收益概览</div>
        <div id="incomeSummary" class="card-body income-summary-body loading"><div class="spinner"></div><p>加载中...</p></div>
      </div>
      <div class="card">
        <div class="card-header">最近资金流水</div>
        <div id="transactionList" class="loading"><div class="spinner"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">收益明细时间曲线</div>
      <div id="incomeDetail" class="loading"><div class="spinner"></div><p>加载中...</p></div>
    </div>
  </div>

  <script src="../../js/api.js"></script>
  <script>
    const TX_LABEL = {
      rider_income: '配送收益',
      withdraw: '提现',
      merchant_income: '订单入账',
      refund: '退款',
      recharge: '充值',
      payment: '支付'
    };

    function money(v) { return Number(v || 0).toFixed(2); }
    function txLabel(type) { return TX_LABEL[type] || type || '-'; }
    function signedAmount(v) {
      const n = Number(v || 0);
      return `${n >= 0 ? '+' : '-'}¥${money(Math.abs(n))}`;
    }
    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
    function timeValue(value) {
      const t = new Date(value).getTime();
      return Number.isFinite(t) ? t : 0;
    }
    function shortTime(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value).slice(0, 10);
      return `${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }
    function fullTime(value) {
      if (!value) return '-';
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? String(value) : d.toLocaleString();
    }

    function halfHourBucket(value) {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return null;
      d.setSeconds(0, 0);
      d.setMinutes(d.getMinutes() < 30 ? 0 : 30);
      return d;
    }

    function bucketEnd(bucket) {
      return new Date(bucket.getTime() + 30 * 60 * 1000);
    }

    function bucketLabel(bucket) {
      const end = bucketEnd(bucket);
      const day = `${String(bucket.getMonth() + 1).padStart(2, '0')}-${String(bucket.getDate()).padStart(2, '0')}`;
      const startTime = `${String(bucket.getHours()).padStart(2, '0')}:${String(bucket.getMinutes()).padStart(2, '0')}`;
      const endTime = `${String(end.getHours()).padStart(2, '0')}:${String(end.getMinutes()).padStart(2, '0')}`;
      return `${day} ${startTime}-${endTime}`;
    }

    function aggregateHalfHourIncome(details) {
      const buckets = new Map();
      for (const row of details || []) {
        if (!row.delivered_time) continue;
        const bucket = halfHourBucket(row.delivered_time);
        if (!bucket) continue;
        const key = bucket.getTime();
        if (!buckets.has(key)) {
          buckets.set(key, { bucket, income: 0, orders: [] });
        }
        const item = buckets.get(key);
        item.income += Number(row.delivery_income || 0);
        item.orders.push(row);
      }
      return [...buckets.values()]
        .sort((a, b) => a.bucket - b.bucket)
        .map(item => ({
          ...item,
          income: Number(item.income.toFixed(2)),
          order_count: item.orders.length
        }));
    }

    function renderTransactions(rows) {
      if (!rows || rows.length === 0) {
        return '<div class="empty-state"><div class="empty-icon">💸</div><p>暂无资金流水</p></div>';
      }
      return `<div class="tx-scroll"><table class="tx-table"><tr><th>时间</th><th>类型</th><th>金额</th><th>余额</th><th>渠道</th><th>关联订单</th><th>备注</th></tr>${rows.map(t => `
        <tr>
          <td class="tx-time">${fullTime(t.create_time)}</td>
          <td>${txLabel(t.transaction_type)}</td>
          <td class="${Number(t.amount) >= 0 ? 'text-success' : 'text-danger'}">${signedAmount(t.amount)}</td>
          <td>¥${money(t.balance_after)}</td>
          <td>${payMethodLabel(t.pay_channel)}</td>
          <td class="tx-order">${t.related_order_id || '-'}</td>
          <td class="tx-remark" title="${escapeHtml(t.remark || '-')}">${escapeHtml(t.remark || '-')}</td>
        </tr>`).join('')}</table></div>`;
    }

    function renderIncomeCurve(details) {
      const rows = aggregateHalfHourIncome(details);

      if (rows.length === 0) {
        return '<div class="text-muted text-center" style="padding:30px">暂无收益记录</div>';
      }

      const width = Math.max(900, rows.length * 95);
      const height = 360;
      const margin = { top: 34, right: 44, bottom: 78, left: 72 };
      const plotW = width - margin.left - margin.right;
      const plotH = height - margin.top - margin.bottom;
      const maxIncome = Math.max(...rows.map(r => Number(r.income || 0)), 1);
      const x = i => margin.left + (rows.length === 1 ? plotW / 2 : (plotW * i / (rows.length - 1)));
      const y = v => margin.top + plotH - (Number(v || 0) / maxIncome) * plotH;
      const points = rows.map((r, i) => `${x(i)},${y(r.income)}`).join(' ');
      const areaPath = `M ${margin.left},${margin.top + plotH} L ${points} L ${margin.left + plotW},${margin.top + plotH} Z`;

      const gridLines = Array.from({ length: 5 }, (_, i) => {
        const value = maxIncome * (4 - i) / 4;
        const gy = margin.top + plotH * i / 4;
        return `
          <line class="chart-grid" x1="${margin.left}" y1="${gy}" x2="${margin.left + plotW}" y2="${gy}"></line>
          <text class="chart-label" x="${margin.left - 10}" y="${gy + 4}" text-anchor="end">¥${money(value)}</text>`;
      }).join('');

      const nodes = rows.map((r, i) => {
        const orderLines = r.orders.map(o =>
          `订单${o.order_id} / ${o.shop_name || '-'} / ¥${money(o.delivery_income)} / ${fullTime(o.delivered_time)}`
        ).join('\n');
        const detail = `时间段：${bucketLabel(r.bucket)}\n订单数：${r.order_count}\n合计收益：¥${money(r.income)}\n${orderLines}`;
        const labelY = margin.top + plotH + 24 + (i % 2) * 18;
        return `
          <g>
            <circle class="chart-point" cx="${x(i)}" cy="${y(r.income)}" r="6">
              <title>${escapeHtml(detail)}</title>
            </circle>
            <text class="chart-value" x="${x(i)}" y="${y(r.income) - 12}" text-anchor="middle">¥${money(r.income)}</text>
            <text class="chart-label" x="${x(i)}" y="${labelY}" text-anchor="middle">${escapeHtml(bucketLabel(r.bucket))}</text>
          </g>`;
      }).join('');

      return `
        <div class="chart-card-body">
          <div class="chart-subtitle">按送达时间每半小时汇总配送收益，同一时间段内多笔订单合并为一个曲线节点，悬停节点可查看该时间段订单明细。</div>
          <div class="chart-wrap">
            <svg class="chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="配送员收益明细时间曲线图">
              ${gridLines}
              <line class="chart-axis" x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${margin.top + plotH}"></line>
              <line class="chart-axis" x1="${margin.left}" y1="${margin.top + plotH}" x2="${margin.left + plotW}" y2="${margin.top + plotH}"></line>
              <path class="chart-area" d="${areaPath}"></path>
              <polyline class="chart-line" points="${points}"></polyline>
              ${nodes}
              <text class="chart-label" x="${margin.left}" y="20">收益（元）</text>
            </svg>
          </div>
        </div>`;
    }

    function renderIncomeSummary(summary) {
      const totalDeliveries = Number(summary.total_deliveries || 0);
      const totalIncome = Number(summary.total_income || 0);
      document.getElementById('totalDeliveries').textContent = totalDeliveries;
      document.getElementById('avgIncome').textContent = money(totalDeliveries ? totalIncome / totalDeliveries : 0);
      return `
        <div class="grid grid-2" style="gap:12px">
          <div class="stat-card" style="padding:18px 10px"><div class="stat-icon">📦</div><div class="stat-number">${totalDeliveries}</div><div class="stat-label">配送单数</div></div>
          <div class="stat-card" style="padding:18px 10px"><div class="stat-icon">💵</div><div class="stat-number">¥${money(totalIncome)}</div><div class="stat-label">配送收益</div></div>
        </div>`;
    }

    async function loadWallet() {
      const res = await api.get('/rider/wallet');
      if (res.code !== 200) { showToast(res.message || '钱包加载失败', 'error'); return; }
      const d = res.data || {}, s = d.summary || {};
      document.getElementById('walletBalance').textContent = money(d.balance);
      document.getElementById('totalWalletIncome').textContent = money(s.total_income);
      document.getElementById('totalWithdraw').textContent = money(s.total_withdraw);
      document.getElementById('transactionList').innerHTML = renderTransactions(d.transactions || []);
    }

    async function loadIncome() {
      const summaryEl = document.getElementById('incomeSummary');
      const detailEl = document.getElementById('incomeDetail');
      summaryEl.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';
      detailEl.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';
      try {
        const res = await api.get('/rider/income', {
          keyword: document.getElementById('incomeKeyword').value.trim(),
          start_date: document.getElementById('startDate').value,
          end_date: document.getElementById('endDate').value
        });
        if (res.code !== 200) {
          summaryEl.innerHTML = `<div class="text-muted text-center" style="padding:30px">${res.message || '加载失败'}</div>`;
          detailEl.innerHTML = `<div class="text-muted text-center" style="padding:30px">${res.message || '加载失败'}</div>`;
          return;
        }
        const summary = res.data.summary || {};
        const details = Array.isArray(res.data.details) ? res.data.details : [];
        summaryEl.innerHTML = renderIncomeSummary(summary);
        detailEl.innerHTML = renderIncomeCurve(details);
      } catch (e) {
        summaryEl.innerHTML = '<div class="text-muted text-center" style="padding:30px">加载失败，请重试</div>';
        detailEl.innerHTML = '<div class="text-muted text-center" style="padding:30px">加载失败，请重试</div>';
      }
    }

    function resetIncomeQuery() {
      document.getElementById('incomeKeyword').value = '';
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      loadIncome();
    }

    async function withdraw() {
      const amount = document.getElementById('withdrawAmount').value;
      if (!amount || Number(amount) <= 0) { showToast('请输入有效提现金额', 'warning'); return; }
      const res = await api.post('/rider/wallet/withdraw', {
        amount,
        pay_channel: document.getElementById('withdrawChannel').value
      });
      if (res.code === 200) {
        showToast('提现成功', 'success');
        document.getElementById('withdrawAmount').value = '';
        await loadWallet();
      } else {
        showToast(res.message || '提现失败', 'error');
      }
    }

    function refreshAll() {
      loadWallet();
      loadIncome();
    }

    async function loadUserInfo() {
      const u = await checkRole('rider');
      if (u) document.getElementById('userInfo').textContent = '🛵 ' + u.username;
    }
    async function doLogout() {
      await auth.logout('rider');
      window.location.href = '../../index.html';
    }

    loadUserInfo();
    refreshAll();
  </script>
</body>
</html>
