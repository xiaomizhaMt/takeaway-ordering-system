<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配送员首页 - 外卖订餐管理系统</title>
  <link rel="stylesheet" href="../../css/style.css">
<style>
    .user-avatar-btn { display:inline-flex; align-items:center; gap:6px; cursor:pointer; padding:2px 6px; border-radius:8px; transition:background .15s; }
    .user-avatar-btn:hover { background:rgba(0,0,0,.06); }
    .user-avatar-circle { width:32px; height:32px; border-radius:50%; background:var(--primary); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:.9rem; font-weight:600; flex-shrink:0; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">🛵 配送员端</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html" class="active">首页</a></li>
      <li><a href="tasks.html">配送任务</a></li>
      <li><a href="income.html">收益钱包</a></li>
    </ul>
    <div class="navbar-right"><div class="user-avatar-btn" onclick="openProfileModal()"><span class="user-avatar-circle" id="userAvatar">?</span><span class="user-info" id="userInfo"></span></div><a href="javascript:void(0)" class="btn btn-outline btn-sm" onclick="doLogout()">退出</a></div>
  </nav>
  <div class="container">
    <div class="page-header">
      <h2>🛵 工作台</h2>
      <div class="flex gap-10">
        <span id="workStatusBadge" class="badge badge-success">在线</span>
        <button class="btn btn-sm btn-outline" onclick="toggleStatus()">切换状态</button>
      </div>
    </div>
    <div class="grid grid-3 mb-20">
      <div class="card"><div class="card-body stat-card"><div class="stat-icon">📦</div><div class="stat-number" id="pendingCount">0</div><div class="stat-label">待取餐</div></div></div>
      <div class="card"><div class="card-body stat-card"><div class="stat-icon">🏃</div><div class="stat-number" id="deliveringCount">0</div><div class="stat-label">配送中</div></div></div>
      <div class="card"><div class="card-body stat-card"><div class="stat-icon">✅</div><div class="stat-number" id="doneCount">0</div><div class="stat-label">已送达</div></div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <span>可接单的订单（已出餐待配送）</span>
        <div class="flex gap-10">
          <select class="form-control" id="availableSort" style="width:150px" onchange="loadDashboard()">
            <option value="time">按发布时间</option>
            <option value="distance">按距离最近</option>
          </select>
          <button class="btn btn-sm btn-outline" onclick="useRiderLocation()">使用当前定位</button>
        </div>
      </div>
      <div id="availableOrders" class="loading"><div class="spinner"></div></div>
    </div>
  </div>
  
  <div id="profileModal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>👤 个人信息</h3>
        <button class="modal-close" onclick="closeProfileModal()">&times;</button>
      </div>
      <div class="form-group"><label>真实姓名</label><input type="text" class="form-control" id="profileName"></div>
      <div class="form-group"><label>联系电话</label><input type="text" class="form-control" id="profilePhone"></div>
      <button class="btn btn-primary btn-block" onclick="saveProfile()">保存修改</button>
    </div>
  </div>
  <script src="../../js/api.js"></script>
  <script>
    let currentRider = null;
    let currentWorkStatus = 1;
    let riderLocation = null;

    function orderThumbs(imageUrls){
      const urls=(imageUrls||'').split(',').filter(Boolean).slice(0,3);
      if(urls.length===0) return '<span style="font-size:1.6rem">🍽️</span>';
      return urls.map(u=>`<img src="${u}" style="width:42px;height:42px;border-radius:8px;object-fit:cover;margin-right:4px;border:1px solid var(--border)" onerror="this.style.display='none'">`).join('');
    }

    function distanceLabel(o){
      return o.distance_km !== undefined && o.distance_km !== null
        ? `<small class="text-primary">距商家 ${Number(o.distance_km).toFixed(2)} km</small><br>`
        : '<small class="text-muted">暂无坐标</small><br>';
    }

    function deliveryDistanceLabel(o){
      return o.delivery_distance_km !== undefined && o.delivery_distance_km !== null
        ? `<small class="text-muted">配送距离 ${Number(o.delivery_distance_km).toFixed(2)} km</small><br>`
        : '';
    }

    function acceptButton(o){
      const km = o.delivery_distance_km === undefined || o.delivery_distance_km === null ? null : Number(o.delivery_distance_km);
      if (km !== null && km > 50) {
        return '<button class="btn btn-sm btn-outline mt-10" disabled>超过50km</button>';
      }
      return `<button class="btn btn-sm btn-primary mt-10" onclick="acceptTask(${o.order_id})">接单</button>`;
    }

    async function loadDashboard(){
      const taskRes=await api.get('/rider/tasks');
      if(taskRes.code===200){
        const tasks=taskRes.data||[];
        document.getElementById('pendingCount').textContent=tasks.filter(t=>t.delivery_status===0).length;
        document.getElementById('deliveringCount').textContent=tasks.filter(t=>t.delivery_status===1).length;
        document.getElementById('doneCount').textContent=tasks.filter(t=>t.delivery_status===2).length;
      }

      const availableParams = { sort: document.getElementById('availableSort').value };
      if (availableParams.sort === 'distance' && riderLocation) {
        availableParams.lat = riderLocation.lat;
        availableParams.lng = riderLocation.lng;
      }
      const availRes=await api.get('/rider/tasks/available', availableParams);
      const cont=document.getElementById('availableOrders');
      if(availRes.code!==200||!availRes.data||availRes.data.length===0){
        cont.innerHTML='<div class="empty-state"><div class="empty-icon">🎉</div><p>暂无待配送订单</p></div>';
        return;
      }
      cont.innerHTML=availRes.data.map(o=>`
        <div class="flex-between" style="padding:12px;border-bottom:1px solid var(--border)">
          <div class="flex gap-10" style="align-items:center">
            <div>${orderThumbs(o.image_urls)}</div>
            <div><strong>${o.shop_name}</strong><br><small class="text-muted">${o.dish_summary || ''}</small><br>${distanceLabel(o)}${deliveryDistanceLabel(o)}<small class="text-muted">📍 ${o.merchant_address || o.shop_address || '-'}</small></div>
          </div>
          <div class="text-right"><div>¥${o.order_amount}</div>${acceptButton(o)}</div>
        </div>`).join('');
    }

    function useRiderLocation(){
      if(!navigator.geolocation){showToast('浏览器不支持定位','warning');return;}
      navigator.geolocation.getCurrentPosition(pos=>{
        riderLocation={lat:pos.coords.latitude,lng:pos.coords.longitude};
        document.getElementById('availableSort').value='distance';
        showToast('已获取当前位置');
        loadDashboard();
      },()=>showToast('无法获取当前位置，继续按发布时间排序','warning'),{enableHighAccuracy:true,timeout:8000});
    }

    async function acceptTask(orderId){
      const res=await api.post('/rider/tasks/accept',{order_id:orderId});
      if(res.code===200){showToast('接单成功');loadDashboard();}else showToast(res.message,'error');
    }

    async function toggleStatus(){
      const newStatus = currentWorkStatus === 1 ? 0 : 1;
      const res=await api.put('/rider/status',{work_status:newStatus});
      if(res.code===200){
        currentWorkStatus=newStatus;
        document.getElementById('workStatusBadge').textContent=newStatus===1?'在线':'离线';
        document.getElementById('workStatusBadge').className=newStatus===1?'badge badge-success':'badge badge-secondary';
        showToast(res.message);
      }else showToast(res.message,'error');
    }

    function openProfileModal() {
      const u = currentRider || {};
      document.getElementById('profileName').value = u.rider_name || '';
      document.getElementById('profilePhone').value = u.phone || '';
      document.getElementById('profileModal').classList.remove('hidden');
    }

    function closeProfileModal() {
      document.getElementById('profileModal').classList.add('hidden');
    }

    async function saveProfile() {
      const data = {
        rider_name: document.getElementById('profileName').value.trim(),
        phone: document.getElementById('profilePhone').value.trim()
      };
      const res = await api.put('/rider/profile', data);
      if (res.code === 200) {
        showToast('个人信息已更新');
        closeProfileModal();
        loadProfile();
      } else {
        showToast(res.message || '保存失败', 'error');
      }
    }

    async function loadProfile(){
      const res=await api.get('/rider/profile');
      if(res.code===200){
        currentRider=res.data;
        currentWorkStatus=res.data.work_status;
        document.getElementById('workStatusBadge').textContent=currentWorkStatus===1?'在线':'离线';
        document.getElementById('workStatusBadge').className=currentWorkStatus===1?'badge badge-success':'badge badge-secondary';
      }
    }
    async function loadUserInfo(){const u=await checkRole('rider');if(u){document.getElementById('userInfo').textContent=u.username;document.getElementById('userAvatar').textContent=u.username.charAt(0);}}
    async function doLogout(){await auth.logout('rider');window.location.href='../../index.html';}
    loadUserInfo();loadProfile();loadDashboard();
  </script>
</body>
</html>
