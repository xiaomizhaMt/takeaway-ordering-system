<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>订单监管 - 管理后台</title><link rel="stylesheet" href="../../css/style.css">
  <style>
    .order-header {
      align-items: flex-start;
      gap: 20px;
    }

    .order-header h2 {
      flex: 0 0 170px;
      min-width: 170px;
      white-space: nowrap;
    }

    .order-toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
      min-width: 0;
    }

    .order-mode-tabs,
    .order-filters {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .order-mode-tabs .btn {
      min-width: 76px;
      justify-content: center;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .order-filters .form-control {
      width: auto;
      flex: 0 0 auto;
    }

    #orderKeyword { width: 180px; }
    #statusFilter { width: 150px; }
    #startDate,
    #endDate { width: 220px; }

    @media (max-width: 900px) {
      .order-header {
        flex-direction: column;
      }

      .order-toolbar {
        justify-content: flex-start;
        width: 100%;
      }
    }
  </style></head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">⚙️ 管理后台</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">首页</a></li>
      <li><a href="users.html">用户管理</a></li>
      <li><a href="merchants.html">商家管理</a></li>
      <li><a href="riders.html">配送员管理</a></li>
      <li><a href="orders.html" class="active">订单监管</a></li>
      <li><a href="complaints.html">投诉管理</a></li>
      <li><a href="statistics.html">数据统计</a></li>
    </ul>
    <div class="navbar-right"><span class="user-info" id="userInfo"></span><a href="javascript:void(0)" class="btn btn-outline btn-sm" onclick="doLogout()">退出</a></div>
  </nav>
  <div class="container">
    <div class="page-header order-header"><h2>📋 订单监管</h2>
      <div class="order-toolbar">
        <div class="order-mode-tabs">
          <button class="btn btn-sm btn-primary" data-query-mode="orders" onclick="setQueryMode('orders')">全部订单</button>
          <button class="btn btn-sm btn-outline" data-query-mode="abnormal" onclick="setQueryMode('abnormal')">异常订单</button>
          <button class="btn btn-sm btn-outline" data-query-mode="amount" onclick="setQueryMode('amount')">金额校验</button>
        </div>
        <div class="order-filters">
          <input type="text" class="form-control" id="orderKeyword" placeholder="订单号/用户/商家" onkeydown="if(event.key==='Enter') loadOrders()">
          <select class="form-control" id="statusFilter" onchange="loadOrders()">
          <option value="">全部订单</option>
          <option value="0">待支付</option>
          <option value="1">待接单</option>
          <option value="2">备餐中</option>
          <option value="3">已出餐</option>
          <option value="4">配送中</option>
          <option value="5">已完成</option>
          <option value="6">已取消</option>
          <option value="7">异常</option>
          </select>
          <input type="date" class="form-control" id="startDate" onchange="loadOrders()">
          <input type="date" class="form-control" id="endDate" onchange="loadOrders()">
          <button class="btn btn-primary" id="orderSearchBtn" onclick="loadOrders()">查询</button>
          <button class="btn btn-outline" id="orderResetBtn" onclick="resetOrderQuery()">重置</button>
        </div>
      </div>
    </div>
    <div id="orderList" class="loading"><div class="spinner"></div></div>
  </div>
  <script src="../../js/api.js"></script>
  <script>
    let queryMode = 'orders';
    function orderThumbs(imageUrls){
      const urls=(imageUrls||'').split(',').filter(Boolean).slice(0,3);
      if(urls.length===0) return '<span style="font-size:1.4rem">🍽️</span>';
      return urls.map(u=>`<img src="${u}" style="width:36px;height:36px;border-radius:8px;object-fit:cover;margin-right:4px;border:1px solid var(--border)" onerror="this.style.display='none'">`).join('');
    }
    function setQueryMode(mode){
      queryMode=mode;
      document.querySelectorAll('[data-query-mode]').forEach(btn=>{
        const active=btn.dataset.queryMode===mode;
        btn.classList.toggle('btn-primary',active);
        btn.classList.toggle('btn-outline',!active);
      });
      const showOrderFilters=mode==='orders';
      ['statusFilter','orderKeyword','startDate','endDate','orderSearchBtn','orderResetBtn'].forEach(id=>{
        document.getElementById(id).style.display=showOrderFilters?'':'none';
      });
      if(mode==='orders') loadOrders();
      else if(mode==='abnormal') loadAbnormalOrders();
      else loadAmountCheck();
    }
    async function loadOrders(){
      if(queryMode!=='orders') return;
      const status=document.getElementById('statusFilter').value;
      const params={
        order_status: status,
        keyword: document.getElementById('orderKeyword').value.trim(),
        start_date: document.getElementById('startDate').value,
        end_date: document.getElementById('endDate').value
      };
      const res=await api.get('/admin/orders',params);
      if(res.code!==200)return;
      const cont=document.getElementById('orderList');
      if(!res.data||res.data.length===0){cont.innerHTML='<div class="empty-state"><div class="empty-icon">📦</div><p>暂无订单</p></div>';return;}
      cont.innerHTML=`<div class="table-container"><table><tr><th>订单号</th><th>菜品</th><th>用户</th><th>商家</th><th>金额</th><th>状态</th><th>支付</th><th>时间</th></tr>${res.data.map(o=>`<tr><td>${o.order_id}</td><td><div>${orderThumbs(o.image_urls)}</div><small class="text-muted">${o.dish_summary||''}</small></td><td>${o.user_name||'-'}</td><td>${o.shop_name||'-'}</td><td>¥${o.order_amount}</td><td>${orderStatusLabel(o.order_status)}</td><td>${payStatusLabel(o.pay_status)}</td><td>${new Date(o.create_time).toLocaleString()}</td></tr>`).join('')}</table></div>`;
    }
    function resetOrderQuery(){
      document.getElementById('orderKeyword').value='';
      document.getElementById('statusFilter').value='';
      document.getElementById('startDate').value='';
      document.getElementById('endDate').value='';
      loadOrders();
    }
    async function loadAbnormalOrders(){
      const res=await api.get('/admin/core/abnormal-orders');
      const cont=document.getElementById('orderList');
      if(res.code!==200){cont.innerHTML=`<div class="empty-state"><p>${res.message}</p></div>`;return;}
      if(!res.data||res.data.length===0){cont.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><p>暂无异常订单</p></div>';return;}
      cont.innerHTML=`<div class="table-container"><table><tr><th>订单号</th><th>用户</th><th>商家</th><th>配送员</th><th>订单状态</th><th>配送状态</th><th>异常说明</th><th>时间</th></tr>${res.data.map(o=>`<tr><td>${o.order_id}</td><td>${o.username||'-'}</td><td>${o.shop_name||'-'}</td><td>${o.rider_name||'-'}</td><td>${orderStatusLabel(o.order_status)}</td><td>${o.delivery_status!==null&&o.delivery_status!==undefined?deliveryStatusLabel(o.delivery_status):'-'}</td><td>${o.exception_note||'-'}</td><td>${new Date(o.create_time).toLocaleString()}</td></tr>`).join('')}</table></div>`;
    }
    async function loadAmountCheck(){
      const res=await api.get('/admin/core/amount-check');
      const cont=document.getElementById('orderList');
      if(res.code!==200){cont.innerHTML=`<div class="empty-state"><p>${res.message}</p></div>`;return;}
      if(!res.data||res.data.length===0){cont.innerHTML='<div class="empty-state"><p>暂无可校验订单</p></div>';return;}
      cont.innerHTML=`<div class="table-container"><table><tr><th>订单号</th><th>菜品小计</th><th>配送费</th><th>订单金额</th><th>校验结果</th></tr>${res.data.map(o=>`<tr><td>${o.order_id}</td><td>¥${o.item_total}</td><td>¥${o.delivery_fee}</td><td>¥${o.order_amount}</td><td>${o.amount_check==='正确'?'<span class="badge badge-success">正确</span>':'<span class="badge badge-danger">错误</span>'}</td></tr>`).join('')}</table></div>`;
    }
    async function loadUserInfo(){const u=await checkRole('admin');if(u)document.getElementById('userInfo').textContent='👑 '+u.username;}
    async function doLogout(){await auth.logout('admin');window.location.href='../../index.html';}
    loadUserInfo();loadOrders();
  </script>
</body>
</html>
