<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>数据统计 - 管理后台</title><link rel="stylesheet" href="../../css/style.css"></head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">⚙️ 管理后台</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">首页</a></li>
      <li><a href="users.html">用户管理</a></li>
      <li><a href="merchants.html">商家管理</a></li>
      <li><a href="riders.html">配送员管理</a></li>
      <li><a href="orders.html">订单监管</a></li>
      <li><a href="complaints.html">投诉管理</a></li>
      <li><a href="statistics.html" class="active">数据统计</a></li>
    </ul>
    <div class="navbar-right"><span class="user-info" id="userInfo"></span><a href="javascript:void(0)" class="btn btn-outline btn-sm" onclick="doLogout()">退出</a></div>
  </nav>
  <div class="container">
    <div class="page-header"><h2>📊 数据统计</h2></div>
    <div class="grid grid-2">
      <div class="card">
        <div class="card-header">每日订单趋势（最近7天）</div>
        <div id="dailyTrend" class="loading"><div class="spinner"></div></div>
      </div>
      <div class="card">
        <div class="card-header">商家营收排行（Top 10）</div>
        <div id="merchantRevenue" class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
  <script src="../../js/api.js"></script>
  <script>
    async function loadStats(){
      const overviewRes=await api.get('/admin/statistics/overview');
      if(overviewRes.code===200){} // 概览数据保留给后续统计卡片复用。

      const dailyRes=await api.get('/admin/statistics/trends');

      const cont=document.getElementById('dailyTrend');
      if(dailyRes.code===200&&dailyRes.data&&dailyRes.data.length>0){
          cont.innerHTML=`<div class="table-container"><table><tr><th>日期</th><th>订单数</th><th>营收</th><th>配送完成</th></tr>${dailyRes.data.map(d=>`<tr><td>${d.date}</td><td>${d.order_count}</td><td>¥${parseFloat(d.revenue).toFixed(2)}</td><td>${d.order_count||0}</td></tr>`).join('')}</table></div>`;
      } else cont.innerHTML='<div class="text-muted text-center" style="padding:30px">暂无数据</div>';

      const rankRes=await api.get('/admin/statistics/merchant-ranking',{sort_by:'revenue'});
      const rankCont=document.getElementById('merchantRevenue');
      if(rankRes.code===200&&rankRes.data&&rankRes.data.length>0){
        rankCont.innerHTML=`<div class="table-container"><table><tr><th>排名</th><th>商家</th><th>订单量</th><th>营收</th></tr>${rankRes.data.map((m,i)=>`<tr><td>${i+1}</td><td>${m.shop_name}</td><td>${m.order_count}</td><td>¥${parseFloat(m.total_revenue).toFixed(2)}</td></tr>`).join('')}</table></div>`;
      } else rankCont.innerHTML='<div class="text-muted text-center" style="padding:30px">暂无数据</div>';
    }
    async function loadUserInfo(){const u=await checkRole('admin');if(u)document.getElementById('userInfo').textContent='👑 '+u.username;}
    async function doLogout(){await auth.logout('admin');window.location.href='../../index.html';}
    loadUserInfo();loadStats();
  </script>
</body>
</html>
