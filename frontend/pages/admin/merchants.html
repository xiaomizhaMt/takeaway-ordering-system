<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商家管理 - 管理后台</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">⚙️ 管理后台</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">首页</a></li>
      <li><a href="users.html">用户管理</a></li>
      <li><a href="merchants.html" class="active">商家管理</a></li>
      <li><a href="riders.html">配送员管理</a></li>
      <li><a href="orders.html">订单监管</a></li>
      <li><a href="complaints.html">投诉管理</a></li>
      <li><a href="statistics.html">数据统计</a></li>
    </ul>
    <div class="navbar-right">
      <span class="user-info" id="userInfo"></span>
      <a href="javascript:void(0)" class="btn btn-outline btn-sm" onclick="doLogout()">退出</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h2>🏪 商家管理</h2>
      <div class="flex gap-10">
        <input type="text" class="form-control" id="merchantKeyword" placeholder="账号/店铺名称" style="width:180px" onkeydown="if(event.key==='Enter') loadMerchants()">
        <select class="form-control" id="auditFilter" style="width:150px" onchange="loadMerchants()">
          <option value="">全部</option>
          <option value="0">待审核</option>
          <option value="1">已通过</option>
          <option value="2">已驳回</option>
        </select>
        <button class="btn btn-primary" onclick="loadMerchants()">查询</button>
        <button class="btn btn-outline" onclick="resetMerchantQuery()">重置</button>
      </div>
    </div>
    <div id="merchantList" class="loading"><div class="spinner"></div></div>
  </div>

  <script src="../../js/api.js"></script>
  <script>
    const TYPE_LABELS = {
      '婵傛儼灏崪鏍ф殝': '奶茶咖啡',
      '濂惰尪鍜栧暋': '奶茶咖啡',
      '濮瑰鐗庤箛顐︻樀': '汉堡快餐',
      '姹夊牎蹇': '汉堡快餐',
      '缁磭鐭囧Ч銈夋桨': '米粉汤面',
      '绫崇矇姹ら潰': '米粉汤面',
      '閻懷呭劙鐏忓繐鎮?': '烧烤小吃',
      '鐑х儰灏忓悆': '烧烤小吃',
      '缁儵顥ら悽婊冩惂': '粥食甜品',
      '绮ラ鐢滃搧': '粥食甜品',
      '閻戭厾鍊板锝夘樀': '热炒正餐',
      '鐑倰姝ｉ': '热炒正餐',
      '閸忔湹绮?': '其他',
      '鍏朵粬': '其他',
      '其他': '其他'
    };

    function safeText(value) {
      return String(value ?? '').replace(/[&<>"']/g, s => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[s]));
    }

    function merchantTypeText(merchant) {
      const value = merchant.shop_type || merchant.merchant_type || '';
      return TYPE_LABELS[value] || value || '其他';
    }

    function businessStatusLabel(status) {
      return Number(status) === 1
        ? '<span class="badge badge-success">营业</span>'
        : '<span class="badge badge-secondary">歇业</span>';
    }

    function auditStatusLabel(status) {
      const value = Number(status);
      if (value === 0) return '<span class="badge badge-warning">待审核</span>';
      if (value === 1) return '<span class="badge badge-success">已通过</span>';
      return '<span class="badge badge-danger">已驳回</span>';
    }

    function actionButtons(merchant) {
      if (Number(merchant.audit_status) === 0) {
        return `<button class="btn btn-sm btn-success" onclick="audit(${merchant.merchant_id},1)">通过</button>
                <button class="btn btn-sm btn-danger" onclick="audit(${merchant.merchant_id},2)">驳回</button>
                <button class="btn btn-sm btn-outline" onclick="deleteMerchant(${merchant.merchant_id})">删除</button>`;
      }
      return `<button class="btn btn-sm btn-outline" onclick="audit(${merchant.merchant_id},0)">重置审核</button>
              <button class="btn btn-sm btn-outline" onclick="deleteMerchant(${merchant.merchant_id})">删除</button>`;
    }

    function merchantRow(merchant) {
      return `<tr>
        <td>${merchant.merchant_id}</td>
        <td>${safeText(merchant.account)}</td>
        <td>${safeText(merchant.password || '-')}</td>
        <td>${safeText(merchant.shop_name)}</td>
        <td>${safeText(merchantTypeText(merchant))}</td>
        <td>${safeText(merchant.contact_name || '-')}</td>
        <td>${safeText(merchant.contact_phone || '-')}</td>
        <td>${businessStatusLabel(merchant.business_status)}</td>
        <td>${auditStatusLabel(merchant.audit_status)}</td>
        <td>${actionButtons(merchant)}</td>
      </tr>`;
    }

    async function loadMerchants() {
      const params = {
        audit_status: document.getElementById('auditFilter').value,
        keyword: document.getElementById('merchantKeyword').value.trim()
      };
      const res = await api.get('/admin/merchants', params);
      if (res.code !== 200) return;

      const cont = document.getElementById('merchantList');
      const merchants = res.data || [];
      if (!merchants.length) {
        cont.innerHTML = '<div class="empty-state"><div class="empty-icon">🏪</div><p>暂无商家</p></div>';
        return;
      }

      cont.innerHTML = `<div class="table-container"><table>
        <tr>
          <th>ID</th>
          <th>账号</th>
          <th>密码</th>
          <th>店铺名称</th>
          <th>商家类型</th>
          <th>联系人</th>
          <th>电话</th>
          <th>营业状态</th>
          <th>审核状态</th>
          <th>操作</th>
        </tr>
        ${merchants.map(merchantRow).join('')}
      </table></div>`;
    }

    function resetMerchantQuery() {
      document.getElementById('merchantKeyword').value = '';
      document.getElementById('auditFilter').value = '';
      loadMerchants();
    }

    async function deleteMerchant(id) {
      if (!confirm('确认删除该商家？将同时删除其所有菜品。')) return;
      const res = await api.del(`/admin/merchants/${id}`);
      if (res.code === 200) {
        showToast('已删除');
        loadMerchants();
      } else {
        showToast(res.message, 'error');
      }
    }

    async function audit(id, status) {
      const label = status === 1 ? '通过' : status === 2 ? '驳回' : '重置';
      if (!confirm(`确认${label}该商家？`)) return;
      const res = await api.put(`/admin/merchants/${id}/audit`, { audit_status: status });
      if (res.code === 200) {
        showToast(`已${label}`);
        loadMerchants();
      } else {
        showToast(res.message, 'error');
      }
    }

    async function loadUserInfo() {
      const u = await checkRole('admin');
      if (u) document.getElementById('userInfo').textContent = '👑 ' + u.username;
    }

    async function doLogout() {
      await auth.logout('admin');
      window.location.href = '../../index.html';
    }

    loadUserInfo();
    loadMerchants();
  </script>
</body>
</html>
