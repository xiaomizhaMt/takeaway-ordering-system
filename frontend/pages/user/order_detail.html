<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>订单详情 - 外卖订餐管理系统</title><link rel="stylesheet" href="../../css/style.css"></head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">🍱 外卖订餐</div>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">首页</a></li>
      <li><a href="orders.html" class="active">我的订单</a></li>
      <li><a href="reviews.html">我的评价</a></li>
      <li><a href="wallet.html">我的钱包</a></li>
    </ul>
    <div class="navbar-right"><span class="user-info" id="userInfo"></span><a href="javascript:void(0)" class="btn btn-outline btn-sm" onclick="doLogout()">退出</a></div>
  </nav>
  <div class="container">
    <div class="page-header"><h2>📄 订单详情</h2><a href="orders.html" class="btn btn-outline">← 返回</a></div>
    <div id="orderDetail" class="loading"><div class="spinner"></div><p>加载中...</p></div>
  </div>
  <script src="../../js/api.js"></script>
  <script>
    const orderId = new URLSearchParams(window.location.search).get('order_id');
    async function loadDetail() {
      const res = await api.get(`/user/orders/${orderId}`);
      if (res.code !== 200) { document.getElementById('orderDetail').innerHTML=`<div class="empty-state"><p>${res.message}</p></div>`; return; }
      const o = res.data;
      const afterSaleLabel = {0: '无', 1: '申请中', 2: '已处理'};
      document.getElementById('orderDetail').innerHTML = `
        <div class="card mb-20">
          <div class="card-header">订单信息</div>
          <div class="card-body">
            <div class="grid grid-2">
              <div><strong>订单号：</strong>${o.order_id}</div>
              <div><strong>商家：</strong>${o.shop_name}</div>
              <div><strong>订单状态：</strong>${orderStatusLabel(o.order_status)}</div>
              <div><strong>支付状态：</strong>${payStatusLabel(o.pay_status)}</div>
              <div><strong>支付方式：</strong>${payMethodLabel(o.payment?.pay_method || o.pay_method)}</div>
              <div><strong>支付时间：</strong>${(o.payment?.pay_time || o.pay_time) ? new Date(o.payment?.pay_time || o.pay_time).toLocaleString() : '未支付'}</div>
              <div><strong>订单金额：</strong><span class="text-primary">¥${o.order_amount}</span></div>
              <div><strong>配送费：</strong>¥${o.delivery_fee}</div>
              <div><strong>餐具份数：</strong>${o.tableware_count || 1} 份</div>
              <div><strong>支付金额：</strong><span class="text-primary">¥${o.payment?.pay_amount || o.order_amount}</span></div>
              <div><strong>下单时间：</strong>${new Date(o.create_time).toLocaleString()}</div>
              <div><strong>售后状态：</strong>${afterSaleLabel[o.after_sale_status] || '无'}</div>
            </div>
          </div>
        </div>

        <div class="card mb-20">
          <div class="card-header">收货信息</div>
          <div class="card-body">
            <p><strong>收货人：</strong>${o.receiver_name}</p>
            <p><strong>联系电话：</strong>${o.receiver_phone}</p>
            <p><strong>收货地址：</strong>${o.receiver_address}</p>
          </div>
        </div>
        <div class="card mb-20">
          <div class="card-header">菜品明细</div>
          <div class="table-container"><table>
            <tr><th>菜品</th><th>单价</th><th>数量</th><th>规格</th><th>小计</th></tr>
            ${(o.items||[]).map(i=>`<tr><td><div class="flex gap-10" style="align-items:center">${i.image_url ? `<img src="${i.image_url}" style="width:46px;height:46px;border-radius:8px;object-fit:cover;border:1px solid var(--border)" onerror="this.outerHTML='<span style=&quot;font-size:1.5rem&quot;>🍽️</span>'">` : '<span style="font-size:1.5rem">🍽️</span>'}<span>${i.dish_name}</span></div></td><td>¥${i.unit_price}</td><td>${i.quantity}</td><td>${i.specification||'-'}</td><td>¥${i.subtotal}</td></tr>`).join('')}
          </table></div>
        </div>
        ${o.delivery ? `
        <div class="card mb-20">
          <div class="card-header">配送信息</div>
          <div class="card-body">
            <p><strong>配送员：</strong>${o.delivery.rider_name||'暂无'}</p>
            <p><strong>配送状态：</strong>${deliveryStatusLabel(o.delivery.delivery_status)}</p>
            ${o.delivery.delivered_time ? `<p><strong>送达时间：</strong>${new Date(o.delivery.delivered_time).toLocaleString()}</p>` : ''}
          </div>
        </div>` : ''}
      `;
    }
    async function loadUserInfo() {
      const u = await checkRole('user');
      if (u) document.getElementById('userInfo').textContent = '👤 ' + u.username;
    }
    async function doLogout() {
      await auth.logout('user');
      window.location.href = '../../index.html';
    }
    loadUserInfo(); loadDetail();
  </script>
</body>
</html>
